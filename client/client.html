<!DOCTYPE html>
<html lang="en">

<head>
  <title>Our simple HTTP server</title>
  <link rel="stylesheet" type="text/css" href="/style.css">
  <link rel="stylesheet" type="text/css" href="/bulma.css">
  <script>
    const handleResponse = async (response, method) => {
      const content = document.querySelector('#content');

      switch (response.status) {
        case 200:
          content.innerHTML = '<b>Success!</b>';
          break;
        case 201:
          content.innerHTML = '<b>Created</b>';
          break;
        case 400:
          content.innerHTML = '<b>Bad Request!</b>';
          break;
        case 204:
          content.innerHTML = '<b>Updated (No Content)</b>';
          break;
        case 404:
          content.innerHTML = 'Not Found';
          break;
        default:
          content.innerHTML = `Error code not implemented by client.`;
      }

      if (method === 'get') {
        const obj = await response.json();
        const jsonstring = JSON.stringify(obj);

        content.innerHTML += `<p>${jsonstring}</p>`;
        console.log(jsonstring);
      }
      else {

      }

    };

    const sendGet = async (form) => {
      const url = form.getAttribute('action');
      const method = form.querySelector('select[name="method"]').value;

      const nameInput = form.querySelector('input[name="name"]');
      const idInput = form.querySelector('input[name="id"]');
      const typeInput = form.querySelector('input[name="type"]');

      const nameField = nameInput ? nameInput.value : '';
      const idField = idInput ? idInput.value : '';
      const typeField = typeInput ? typeInput.value : '';

      let queryString = '';

      if (nameField) queryString += `name=${nameField}&`;
      if (idField) queryString += `id=${idField}&`;
      if (typeField) queryString += `type=${typeField}&`;

      if (queryString.endsWith('&')) {
        queryString = queryString.slice(0, -1);
      }

      let fullUrl = url;

      if (queryString.length > 0) {
        fullUrl += '?' + queryString;
      }

      const response = await fetch(fullUrl, {
        method: method.toUpperCase(),
        headers: {
          'Accept': 'application/json',
        },
      });

      handleResponse(response, method);
    };

    const sendPost = async (form) => {
      const url = form.getAttribute('action');
      const method = form.querySelector('select[name="method"]').value;

      const dataType = 'application/json';

      if (method === 'head') {
        const response = await fetch(url, {
          method: method.toUpperCase(),
          headers: { Accept: 'application/json' },
        });
        return handleResponse(response, method);
      }

      let pokemon;

      if (url === '/UpdatePokemon') {
        const name = form.querySelector('input[name="name"]').value;
        const height = form.querySelector('input[name="height"]').value;
        const weight = form.querySelector('input[name="weight"]').value;

        pokemon = { name, height, weight };
      } else if (url === '/PostPokemons') {
        const id = form.querySelector('input[name="id"]').value;
        const name = form.querySelector('input[name="name"]').value;
        const type = form.querySelector('input[name="type"]').value;

        pokemon = { id, name, type: [type] };
      }

      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': dataType,
          Accept: 'application/json',
        },
        body: JSON.stringify(pokemon),
      });

      handleResponse(response, method);
    };

    const init = () => {
      const getAllPokemon = document.querySelector('#getAllPokemon');
      const getAll = (e) => {
        e.preventDefault();
        sendGet(getAllPokemon);
        return false;
      };
      getAllPokemon.addEventListener('submit', getAll);

      const searchByNameIdType = document.querySelector('#searchByNameIdType');
      const searchAll = (e) => {
        e.preventDefault();
        sendGet(searchByNameIdType);
        return false;
      };
      searchByNameIdType.addEventListener('submit', searchAll);


      const searchByName = document.querySelector('#searchByName');
      const searchName = (e) => {
        e.preventDefault();
        sendGet(searchByName);
        return false;
      };
      searchByName.addEventListener('submit', searchName);

      const searchByIdType = document.querySelector('#searchByIdType');
      const searchIdType = (e) => {
        e.preventDefault();
        sendGet(searchByIdType);
        return false;
      };
      searchByIdType.addEventListener('submit', searchIdType);


      const postPokemon = document.querySelector('#postPokemon');
      const addPokemon = (e) => {
        e.preventDefault();
        sendPost(postPokemon);
        return false;
      };
      postPokemon.addEventListener('submit', addPokemon);

      const updateSize = document.querySelector('#updateSize');
      const updatePokemon = (e) => {
        e.preventDefault();
        sendPost(updateSize);
        return false;
      };
      updateSize.addEventListener('submit', updatePokemon);
    };

    window.onload = init;

  </script>
</head>

<body>
  <section id="top">
    <h1 class="title is-size-1">Pokemon search project</h1>

    <a href="/DocumentAPI" class="title is-4 colored-link has-text-primary-30">
      View API Documentation (click here)
    </a>

    <br>

    <!-- Get all Pokemon -->
    <form id="getAllPokemon" action="/GetAllPoke" method="get">
      <h3 class="title is-4">Get All Pokemon</h3>

      <input class="button is-link" type="submit" value="Fetch" />
      <div class="select">
        <select name="method">
          <option value="get">GET</option>
          <option value="head">HEAD</option>
        </select>
      </div>
    </form>

    <br>

    <!-- Get by name, id, and type -->
    <form id="searchByNameIdType" action="/GetPokemonbyNameIDType" method="get">
      <h3 class="title is-4 has-text-left is-capitalized">Search by Pokeman type</h3>

      <div class="field is-grouped">
        <div class="control is-half">
          <label for="nameField1">Name:</label>
          <input id="nameField1" class="input is-small" type="text" name="name" />

          <label for="idField1">ID:</label>
          <input id="idField1" class="input is-small" type="text" name="id" />

          <label for="typeField1">Type:</label>
          <input id="typeField1" class="input is-small" type="text" name="type" />
        </div>
      </div>


      <input class="button is-link" type="submit" value="Search" />
      <div class="select">
        <select name="method">
          <option value="get">GET</option>
          <option value="head">HEAD</option>
        </select>
      </div>
    </form>

    <!-- Get by name -->
    <form id="searchByName" action="/GetName" method="get">
      <h3 class="title is-4">Search by Name</h3>
      <div class="field is-grouped">
        <div class="control is-half">
          <label for="nameField2">Name:</label>
          <input id="nameField2" type="text" class="input is-small" name="name" />
        </div>
      </div>
      <input class="button is-link" type="submit" value="Search" />
      <div class="select">
        <select name="method">
          <option value="get">GET</option>
          <option value="head">HEAD</option>
        </select>
      </div>
    </form>

    <!-- Get by ID and type -->
    <form id="searchByIdType" action="/GetPokemons" method="get">
      <h3 class="title is-4">Search by ID and Type</h3>

      <div class="field is-grouped">
        <div class="control is-half">
          <label for="idField2">ID:</label>
          <input id="idField2" class="input is-small" type="text" name="id" />

          <label for="typeField2">Type:</label>
          <input id="typeField2" class="input is-small" type="text" name="type" />

          <input type="submit" class="button is-link" value="Search" />
          <div class="select">
            <select name="method">
              <option value="get">GET</option>
              <option value="head">HEAD</option>
            </select>
          </div>
        </div>
      </div>
    </form>

    <form id="postPokemon" action="/PostPokemons" method="post">
      <h3 class="title is-4">Add Pokemon</h3>

      <div class="field is-grouped">
        <div class="control is-half">
          <label for="idField3">ID:</label>
          <input id="idField3" class="input is-small" type="text" name="id" />

          <label for="nameField3">Name:</label>
          <input id="nameField3" class="input is-small" type="text" name="name" />

          <label for="typeField3">Type:</label>
          <input id="typeField3" class="input is-small" type="text" name="type" />

        </div>
      </div>
      <input type="submit" class="button is-link" value="Submit" />
      <div class="select">
        <select name="method">
          <option value="post">POST</option>
          <option value="head">HEAD</option>
        </select>
      </div>
    </form>

    <!-- Update weight and height -->
    <form id="updateSize" action="/UpdatePokemon" method="post">
      <h3 class="title is-4">Update Height and Weight</h3>

      <div class="field is-grouped">
        <div class="control is-half">

          <label for="nameField4">Name:</label>
          <input id="nameField4" class="input is-small" type="text" name="name" />

          <label for="heightField">Height:</label>
          <input id="heightField" class="input is-small" type="text" name="height" />

          <label for="weightField">Weight:</label>
          <input id="weightField" class="input is-small" type="text" name="weight" />
        </div>
      </div>
      <input type="submit" class="button is-link" value="Update" />
      <div class="select">
        <select name="method">
          <option value="post">POST</option>
          <option value="head">HEAD</option>
        </select>
      </div>
    </form>

  </section>

  <section id="content" class="is-size-5 has-text-weight-light"></section>

</body>

</html>
